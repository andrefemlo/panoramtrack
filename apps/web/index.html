<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panoram Tracking CRM</title>
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">P</div>
        <div>
          <strong>Panoram</strong>
          <span>Tracking CRM</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <button class="sidebar-link active" type="button" data-view="pipeline">
          Pipeline
        </button>
        <button class="sidebar-link" type="button" data-view="conversations">
          Conversas
        </button>
        <button class="sidebar-link" type="button" data-view="contacts">
          Contatos
        </button>
      </nav>

      <div class="sidebar-footer">
        <span>Ambiente MVP</span>
        <strong id="api-status">Conectando...</strong>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1>Pipeline comercial</h1>
          <p>Leads, conversas e atribuições das campanhas.</p>
        </div>

        <div class="topbar-actions">
          <input id="search-input" class="search-input" type="search"
            placeholder="Buscar lead, telefone ou e-mail..." />
          <button id="refresh-button" class="primary-button" type="button">
            Atualizar
          </button>
        </div>
      </header>

      <section class="content">
        <section class="board-section">
          <div id="board" class="pipeline-board">
            <div class="loading">Carregando leads...</div>
          </div>
        </section>

        <aside id="lead-panel" class="lead-panel hidden">
          <div class="empty-panel">
            Selecione um lead para ver detalhes.
          </div>
        </aside>
      </section>
    </main>
  </div>

  <div id="modal-root"></div>

  <script src="./app.js"></script>
</body>

</html>
