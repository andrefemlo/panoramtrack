name: Build and Deploy CRM API

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/andrefemlo/panoramtrack-api
  PROJECT_PATH: /opt/panoramtrack/repo
  ENV_FILE: /opt/panoramtrack/.env
  COMPOSE_PROJECT_NAME: panoramtrackcrm

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push crm-api image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          file: ./apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ vars.VPS_PORT }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on VPS
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "${{ vars.VPS_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" << 'EOF'
            set -e

            mkdir -p /opt/panoramtrack

            if [ ! -d /opt/panoramtrack/repo/.git ]; then
              rm -rf /opt/panoramtrack/repo
              git clone https://github.com/andrefemlo/panoramtrack.git /opt/panoramtrack/repo
            fi

            cd /opt/panoramtrack/repo

            git fetch origin main
            git reset --hard origin/main

            docker rm -f panoram-crm-api panoram-crm-postgres panoram-crm-redis || true

            docker compose --env-file /opt/panoramtrack/.env -p panoramtrackcrm pull crm-api
            docker compose --env-file /opt/panoramtrack/.env -p panoramtrackcrm up -d

            docker image prune -f
          EOF
